name: Deploy Campaign Worker to Hetzner

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'hetzner-worker/**'
      - 'lib/campaign/**'
      - 'lib/sms/**'
      - 'lib/voice/**'
      - 'lib/email/**'
      - 'lib/pinnacle/**'
      - 'lib/plaud/**'
      - 'lib/supabase.ts'
      - 'lib/google.ts'
      - 'lib/claude.ts'
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /app
            git pull origin main
            npm install --production
            # startOrReload re-reads ecosystem.config.js so config changes
            # (e.g. max_memory_restart) actually apply. Plain `pm2 restart
            # campaign-worker` reuses the cached process definition and silently
            # ignores config edits.
            pm2 startOrReload hetzner-worker/ecosystem.config.js --update-env
            pm2 save
            echo "Campaign worker deployed at $(date)"
