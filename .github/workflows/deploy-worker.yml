name: Deploy Campaign Worker to Hetzner

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'hetzner-worker/**'
      - 'lib/campaign/**'
      - 'lib/sms/**'
      - 'lib/voice/**'
      - 'lib/email/**'
      - 'lib/pinnacle/**'
      - 'lib/plaud/**'
      - 'lib/supabase.ts'
      - 'lib/google.ts'
      - 'lib/claude.ts'
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /app
            # Surface any local edits on the box BEFORE we touch them — a dirty
            # working tree silently aborted `git pull` ("local changes would be
            # overwritten" → Aborting), which left the worker running STALE code
            # while the deploy still reported success. Log the diff, stash it
            # (recoverable via `git stash list`), then hard-sync to origin/main
            # so deploys are deterministic regardless of box-local drift.
            echo "=== box-local changes before deploy ==="
            git status --porcelain || true
            git --no-pager diff || true
            echo "=== syncing to origin/main ==="
            git fetch origin main
            git stash push -u -m "pre-deploy-autostash" || true
            git pull --ff-only origin main || git reset --hard origin/main
            npm install --production
            # Deterministic restart: delete + start from the ecosystem file so
            # the new config (max_memory_restart) AND new code always take, and
            # the worker reliably ends up RUNNING. `pm2 reload`/`startOrReload`
            # is for cluster mode and can leave a fork-mode tsx app `stopped`;
            # `pm2 restart <name>` ignores config-file edits entirely. The worker
            # is a stateless DB poller, so a clean re-start loses nothing.
            pm2 delete campaign-worker 2>/dev/null || true
            pm2 start hetzner-worker/ecosystem.config.js --update-env
            pm2 save
            echo "Campaign worker deployed at $(date) — now at $(git rev-parse --short HEAD)"
            # Post-deploy health snapshot — let it settle, then report real status
            # + the error log so a failed start surfaces here instead of looking
            # like a green deploy.
            sleep 6
            echo "=== pm2 status after deploy ==="
            pm2 describe campaign-worker | grep -E 'status|restarts|uptime|script|interpreter|exec mode' || true
            echo "=== campaign-worker-error.log tail ==="
            tail -n 60 /app/logs/campaign-worker-error.log 2>/dev/null || true
            echo "=== campaign-worker-out.log tail ==="
            tail -n 30 /app/logs/campaign-worker-out.log 2>/dev/null || true
